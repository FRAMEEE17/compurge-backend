services:
  - type: web
    name: compurge-api
    runtime: go
    plan: free
    buildCommand: go build -o bin/api ./cmd/api
    startCommand: ./bin/api
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: MAX_UPLOAD_SIZE_BYTES
        value: 10485760
      - key: MAX_CONCURRENT_INGEST
        value: 50
      - key: ALLOWED_ORIGINS
        sync: false

